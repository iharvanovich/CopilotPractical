<mat-toolbar color="primary" class="main-toolbar">
  <button
    mat-icon-button
    class="menu-toggle"
    (click)="sidenav.toggle()"
    aria-label="Toggle sidenav"
  >
    <mat-icon>menu</mat-icon>
  </button>
  <span class="app-title">Training Tracker</span>
</mat-toolbar>

<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #sidenav
    class="sidenav"
    fixedInViewport
    [attr.role]="'navigation'"
    aria-label="Side navigation"
  >
    <mat-nav-list>
      <a
        mat-list-item
        class="nav-link"
        routerLink="/dashboard"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="sidenav.close()"
      >
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle class="nav-label">Dashboard</span>
      </a>
      <a
        mat-list-item
        class="nav-link"
        routerLink="/employees"
        routerLinkActive="active"
        (click)="sidenav.close()"
      >
        <mat-icon matListItemIcon>group</mat-icon>
        <span matListItemTitle class="nav-label">Employees</span>
      </a>
      <a
        mat-list-item
        class="nav-link"
        routerLink="/courses"
        routerLinkActive="active"
        (click)="sidenav.close()"
      >
        <mat-icon matListItemIcon>school</mat-icon>
        <span matListItemTitle class="nav-label">Courses</span>
      </a>
      <a
        mat-list-item
        class="nav-link"
        routerLink="/assignments"
        routerLinkActive="active"
        (click)="sidenav.close()"
      >
        <mat-icon matListItemIcon>assignment</mat-icon>
        <span matListItemTitle class="nav-label">Assignments</span>
      </a>
      <a
        mat-list-item
        class="nav-link"
        routerLink="/overdue"
        routerLinkActive="active"
        (click)="sidenav.close()"
      >
        <mat-icon matListItemIcon>warning</mat-icon>
        <span matListItemTitle class="nav-label">Overdue</span>
      </a>
      <mat-divider></mat-divider>
      <a
        mat-list-item
        class="nav-link"
        routerLink="/admin"
        routerLinkActive="active"
        (click)="sidenav.close()"
      >
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle class="nav-label">Admin</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="sidenav-content">
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
