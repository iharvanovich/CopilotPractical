<div class="admin-container">
  <h1>Administration</h1>

  <mat-tab-group>
    <mat-tab label="Course Categories">
      <div class="tab-content">
        <div *ngIf="loading" class="loading">
          <mat-progress-bar mode="indeterminate"></mat-progress-bar>
        </div>

        <div *ngIf="error" class="error-message">
          {{ error }}
        </div>

        <form [formGroup]="form" class="category-form" (ngSubmit)="saveCategory()">
          <h3>{{ editingId ? 'Edit' : 'Add' }} Category</h3>
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Category Name</mat-label>
            <input matInput formControlName="name" required />
          </mat-form-field>

          <div class="form-actions">
            <button mat-raised-button color="primary" type="submit" [disabled]="!form.valid || saving">
              {{ editingId ? 'Update' : 'Add' }}
            </button>
            <button mat-button type="button" (click)="cancel()" *ngIf="editingId">Cancel</button>
          </div>
        </form>

        <h3>Categories</h3>
        <table *ngIf="!loading && categories.length > 0" mat-table [dataSource]="categories" class="categories-table">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Name</th>
            <td mat-cell *matCellDef="let element">{{ element.name }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let element">
              <button mat-icon-button (click)="editCategory(element)" matTooltip="Edit">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button (click)="deleteCategory(element.id)" matTooltip="Delete">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <div *ngIf="!loading && categories.length === 0" class="empty-state">
          <p>No categories found</p>
        </div>
      </div>
    </mat-tab>
  </mat-tab-group>
</div>
