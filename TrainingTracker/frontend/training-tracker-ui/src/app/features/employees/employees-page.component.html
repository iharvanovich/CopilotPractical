<div class="employees-container">
  <div class="header">
    <h1>Employees</h1>
    <a mat-raised-button color="primary" routerLink="/employees/new">
      <mat-icon>add</mat-icon>
      Add Employee
    </a>
  </div>

  <div *ngIf="loading" class="loading">
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  </div>

  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>

  <div *ngIf="!loading && employees.length === 0" class="empty-state">
    <p>No employees found. <a routerLink="/employees/new">Create one</a></p>
  </div>

  <table *ngIf="!loading && employees.length > 0" mat-table [dataSource]="employees" class="employees-table">
    <ng-container matColumnDef="fullName">
      <th mat-header-cell *matHeaderCellDef>Full Name</th>
      <td mat-cell *matCellDef="let element">{{ element.fullName }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let element">{{ element.email || '-' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let element">
        <a
          mat-icon-button
          class="action-button action-button-edit"
          [routerLink]="['/employees', element.id]"
          matTooltip="View"
        >
          <mat-icon>edit</mat-icon>
        </a>
        <button
          mat-icon-button
          class="action-button action-button-delete"
          (click)="deleteEmployee(element.id)"
          matTooltip="Delete"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
