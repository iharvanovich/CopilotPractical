<div class="assignments-container">
  <div class="header">
    <h1>Assignments</h1>
    <a mat-raised-button color="primary" routerLink="/assignments/new">
      <mat-icon>add</mat-icon>
      New Assignment
    </a>
  </div>

  <div *ngIf="loading" class="loading">
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  </div>

  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>

  <div *ngIf="!loading && assignments.length === 0" class="empty-state">
    <p>No assignments found. <a routerLink="/assignments/new">Create one</a></p>
  </div>

  <table *ngIf="!loading && assignments.length > 0" mat-table [dataSource]="assignments" class="assignments-table">
    <ng-container matColumnDef="employeeName">
      <th mat-header-cell *matHeaderCellDef>Employee</th>
      <td mat-cell *matCellDef="let element">{{ element.employeeName }}</td>
    </ng-container>

    <ng-container matColumnDef="courseTitle">
      <th mat-header-cell *matHeaderCellDef>Course</th>
      <td mat-cell *matCellDef="let element">{{ element.courseTitle }}</td>
    </ng-container>

    <ng-container matColumnDef="assignedAt">
      <th mat-header-cell *matHeaderCellDef>Assigned Date</th>
      <td mat-cell *matCellDef="let element">{{ element.assignedAt | date: 'short' }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let element">
        <mat-chip-set>
          <mat-chip [ngClass]="getStatusClass(element.status)">
            {{ getStatusLabel(element.status) }}
          </mat-chip>
        </mat-chip-set>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let element">
        <a mat-icon-button [routerLink]="['/assignments', element.id]" matTooltip="Edit">
          <mat-icon>edit</mat-icon>
        </a>
        <button mat-icon-button (click)="deleteAssignment(element.id)" matTooltip="Delete">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
