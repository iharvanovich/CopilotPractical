<div class="course-detail-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ courseId && courseId !== 'new' ? 'Edit Course' : 'New Course' }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div *ngIf="loading" class="loading">
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
      </div>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <form [formGroup]="form" class="course-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Title</mat-label>
          <input matInput formControlName="title" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description" rows="4"></textarea>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Category</mat-label>
          <mat-select formControlName="courseCategoryId">
            <mat-option value="">-- None --</mat-option>
            <mat-option *ngFor="let category of categories" [value]="category.id">
              {{ category.name }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Estimated Hours</mat-label>
          <input matInput type="number" formControlName="estimatedHours" />
        </mat-form-field>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="save()" [disabled]="!form.valid || saving">
        Save
      </button>
      <button mat-button (click)="cancel()">Cancel</button>
    </mat-card-actions>
  </mat-card>
</div>
