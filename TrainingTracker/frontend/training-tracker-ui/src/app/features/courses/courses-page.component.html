<div class="courses-container">
  <div class="header">
    <h1>Courses</h1>
    <a mat-raised-button color="primary" routerLink="/courses/new">
      <mat-icon>add</mat-icon>
      Add Course
    </a>
  </div>

  <div *ngIf="loading" class="loading">
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  </div>

  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>

  <div *ngIf="!loading && courses.length === 0" class="empty-state">
    <p>No courses found. <a routerLink="/courses/new">Create one</a></p>
  </div>

  <table *ngIf="!loading && courses.length > 0" mat-table [dataSource]="courses" class="courses-table">
    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef>Title</th>
      <td mat-cell *matCellDef="let element">{{ element.title }}</td>
    </ng-container>

    <ng-container matColumnDef="courseCategoryName">
      <th mat-header-cell *matHeaderCellDef>Category</th>
      <td mat-cell *matCellDef="let element">{{ element.courseCategoryName || '-' }}</td>
    </ng-container>

    <ng-container matColumnDef="estimatedHours">
      <th mat-header-cell *matHeaderCellDef>Hours</th>
      <td mat-cell *matCellDef="let element">{{ element.estimatedHours || '-' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let element">
        <a
          mat-icon-button
          class="action-button action-button-edit"
          [routerLink]="['/courses', element.id]"
          matTooltip="View"
        >
          <mat-icon>edit</mat-icon>
        </a>
        <button
          mat-icon-button
          class="action-button action-button-delete"
          (click)="deleteCourse(element.id)"
          matTooltip="Delete"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
